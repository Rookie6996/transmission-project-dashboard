<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Techno Electric - Transmission Projects Dashboard</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

</head>

<body>

<header>

    <div class="header-top">

    <div class="header-left">

        <img
            src="logo.png"
            alt="Techno Logo"
            class="logo"
        >

        <div>

            <h1>
                Transmission & Substation Projects
            </h1>

            <p>
                असली Techno "Hamari koi Sakha Nahi Hai"
            </p>

        </div>

    </div>

    <div class="header-right">

        <div class="profile-card">

            <img
                src="chandan.png"
                alt="Chandan"
                class="profile-photo"
            >

            <div>

                <h3>Chandan</h3>

                <p>
                    Project Dashboard
                </p>

            </div>

        </div>

    </div>

</div>

    <div class="filters">

        <input
            type="text"
            id="searchInput"
            placeholder="Search Project Name, ID, or Location..."
            onkeyup="applyFilters()">
        >

        <select
            id="voltageFilter"
            onchange="applyFilters()"
        >
            <option value="">
                All Voltage Levels
            </option>
        </select>

        <select
            id="stateFilter"
            onchange="applyFilters()"
        >
            <option value="">
                All States
            </option>
        </select>

    </div>

</header>

<main class="dashboard">

    <section class="stats">

        <div class="card">
            <h3>Total Projects</h3>
            <h1 id="totalProjects">0</h1>
        </div>

        <div class="card">
            <h3>States Covered</h3>
            <h1 id="totalStates">0</h1>
        </div>

        <div class="card">
            <h3>Completed</h3>
            <h1 id="completedProjects">0</h1>
        </div>

        <div class="card">
            <h3>Ongoing</h3>
            <h1 id="ongoingProjects">0</h1>
        </div>

    </section>

    <section class="map-section">

        <div id="map"></div>

    </section>

</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="script.js"></script>

</body>
</html>
